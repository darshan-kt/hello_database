services:
  postgres:
    image: postgres:16
    container_name: ems_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ems
      POSTGRES_USER: ems_app
      POSTGRES_PASSWORD: ems_app_pw
    ports:
      - "5433:5432"
    volumes:
      - ems_pg_data:/var/lib/postgresql/data
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_app -d ems"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: ems_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ems
      DB_USER: ems_app
      DB_PASSWORD: ems_app_pw
      FLASK_SECRET_KEY: dev-secret-change-me
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ems_pg_data:
