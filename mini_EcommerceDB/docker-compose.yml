services:
  mysql:
    image: mysql:8.0
    container_name: mini_ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mini_ecommerce
      MYSQL_USER: ecom_app
      MYSQL_PASSWORD: ecom_app_pw
    ports:
      - "3307:3306"
    volumes:
      - mini_ecommerce_data:/var/lib/mysql
      - ./sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: mini_ecommerce_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: mini_ecommerce
      DB_USER: ecom_app
      DB_PASSWORD: ecom_app_pw
      FLASK_SECRET_KEY: dev-secret-change-me
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mini_ecommerce_data:
